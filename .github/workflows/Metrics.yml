name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          user: X-OH
          config_timezone: Asia/Shanghai   # 改为中国时区（或保留 Europe/Minsk）
          committer_message: "chore: update metrics"
          template: classic
          base: header, activity, community, repositories, metadata

          # ====== 基础插件 ======
          plugin_introduction: yes

          # ====== 日历 ======
          plugin_calendar: yes
          plugin_calendar_limit: 11

          # ====== 3D 贡献日历（等距视图） ======
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ====== 编程语言统计 ======
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # ====== 成就徽章 ======
          plugin_achievements: yes
          plugin_achievements_threshold: 0      # 修改：X 改为数字（0 表示显示所有成就）
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          # ====== 编码习惯 ======
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # ====== 许可证扫描（修复） ======
          plugin_licenses: yes
          # 删除 plugin_licenses_setup，因为仓库没有 package.json
          # 或者保留但改为：plugin_licenses_setup: ""

          # ====== Skyline（3D 年份图，如果继续报错可关闭） ======
          plugin_skyline: yes
          plugin_skyline_year: 2024             # 改为当前年份
          plugin_skyline_frames: 120
          plugin_skyline_quality: 1

          # ====== Star 追踪 ======
          plugin_stargazers: yes
          plugin_stargazers_charts_type: chartist

          # ====== GitHub 支持 ======
          plugin_support: yes

          # ====== 热门 Topics ======
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

          # ====== （可选）关闭世界地图，避免额外令牌错误 ======
          plugin_stargazers_worldmap: true   # 默认未开启，所以不需要加
